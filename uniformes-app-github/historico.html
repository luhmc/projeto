<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historico de Movimentacoes</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="historico">
    <div class="background-shape background-shape-a"></div>
    <div class="background-shape background-shape-b"></div>
    <main class="app-shell history-shell">
        <section class="hero history-hero">
            <div class="page-menu" data-page-menu>
                <button class="page-menu-toggle" type="button" aria-expanded="false" aria-label="Abrir menu de paginas">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="page-menu-panel" aria-label="Navegacao rapida">
                    <a class="page-menu-link" href="./uniformes.html" data-page-link="uniformes">Uniformes</a>
                    <a class="page-menu-link" href="./gerador.html" data-page-link="gerador">Gerador</a>
                </nav>
            </div>
            <div>
                <p class="eyebrow">Historico</p>
                <h1>Movimentacoes completas</h1>
                <p class="hero-copy">Consulta detalhada de entregas, devolucoes, entradas e descartes.</p>
            </div>
            <div class="actions-inline">
                <button id="history-back" class="ghost-button" type="button" data-history-back data-fallback-href="./uniformes.html">Voltar</button>
                <button id="history-export" class="ghost-button" type="button">Exportar historico</button>
            </div>
        </section>

        <section class="stats-grid history-stats" id="history-stats"></section>

        <section class="panel history-panel">
            <div class="panel-header history-panel-header">
                <div>
                    <p class="section-kicker">Filtros</p>
                    <h2>Encontrar movimentacoes</h2>
                </div>
            </div>
            <div class="history-filters">
                <label class="field">
                    <span>Buscar</span>
                    <input id="history-search" type="search" placeholder="Funcionario, uniforme ou tamanho">
                </label>
                <label class="field">
                    <span>Movimento</span>
                    <select id="history-kind">
                        <option value="">Todos</option>
                        <option value="ENTREGA">Entrega</option>
                        <option value="DEVOLUCAO">Devolucao</option>
                        <option value="ENTRADA">Entrada</option>
                        <option value="DESCARTE">Descarte</option>
                    </select>
                </label>
            </div>
            <div id="history-results" class="history-results"></div>
        </section>
    </main>
    <script src="./data.js"></script>
    <script src="./historico.js"></script>
    <script src="./module-nav.js"></script>
</body>
</html>
