<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle de Uniformes Tecnicos</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="uniformes">
    <div class="background-shape background-shape-a"></div>
    <div class="background-shape background-shape-b"></div>
    <main class="app-shell">
        <section class="hero">
            <div class="page-menu" data-page-menu>
                <button class="page-menu-toggle" type="button" aria-expanded="false" aria-label="Abrir menu de paginas">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="page-menu-panel" aria-label="Navegacao rapida">
                    <a class="page-menu-link" href="./uniformes.html" data-page-link="uniformes">Uniformes</a>
                    <a class="page-menu-link" href="./gerador.html" data-page-link="gerador">Gerador</a>
                </nav>
            </div>
            <a class="back-link hero-back-link" href="./index.html" data-esc-back>Voltar</a>
            <div>
                <p class="eyebrow">Uniformes</p>
                <h1>Controle de Uniformes Tecnicos</h1>
                <p class="hero-copy">Estoque, funcionarios e lancamentos</p>
            </div>
        </section>
        <section class="stats-grid" id="stats-grid"></section>
        <section class="content-grid">
            <article class="panel actions-panel">
                <div class="panel-header">
                    <div><p class="section-kicker">Operacao</p><h2>Registrar movimentacao</h2></div>
                    <div class="actions-inline">
                        <button id="export-button" class="ghost-button" type="button">Exportar dados</button>
                        <button id="undo-button" class="ghost-button" type="button">Desfazer ultimo lancamento</button>
                    </div>
                </div>
                <form id="movement-form" class="movement-form">
                    <label class="field"><span>Data</span><input id="movement-date" name="date" type="date" required></label>
                    <label class="field"><span>Funcionario</span><select id="movement-employee" name="employee" required></select></label>
                    <label class="field"><span>Uniforme</span><select id="movement-type" name="type" required></select></label>
                    <label class="field"><span>Tamanho</span><select id="movement-size" name="size" required></select></label>
                    <label class="field"><span>Movimento</span><select id="movement-kind" name="kind" required><option value="ENTREGA">Entrega</option><option value="DEVOLUCAO">Devolucao</option><option value="DESCARTE">Descarte</option><option value="ENTRADA">Entrada por compra</option></select></label>
                    <label class="field"><span>Quantidade</span><input id="movement-quantity" name="quantity" type="number" min="1" step="1" value="1" required></label>
                    <div class="form-footer"><p id="form-feedback" class="form-feedback" aria-live="polite"></p><button class="primary-button" type="submit">Salvar movimentacao</button></div>
                </form>
            </article>
            <article class="panel inventory-panel">
                <div class="panel-header"><div><p class="section-kicker">Estoque</p><h2>Saldo por tamanho</h2></div><input id="inventory-filter" class="search-input" type="search" placeholder="Filtrar uniforme ou tamanho"></div>
                <form id="uniform-form" class="employee-form">
                    <label class="field"><span>Tipo do uniforme</span><input id="uniform-type" type="text" placeholder="Ex.: Camiseta Manga Curta" required></label>
                    <label class="field"><span>Tamanho</span><input id="uniform-size" type="text" placeholder="Ex.: P, GG, 42" required></label>
                    <button class="primary-button" type="submit">Cadastrar uniforme</button>
                </form>
                <div id="inventory-groups" class="inventory-groups"></div>
            </article>
            <article class="panel employees-panel">
                <div class="panel-header">
                    <div><p class="section-kicker">Equipe</p><h2>Funcionarios</h2></div>
                    <div class="actions-inline">
                        <input id="employee-filter" class="search-input" type="search" placeholder="Buscar nome ou setor">
                    </div>
                </div>
                <form id="employee-form" class="employee-form">
                    <label class="field"><span>Novo funcionario</span><input id="employee-name" type="text" placeholder="Nome completo" required></label>
                    <label class="field"><span>Setor</span><input id="employee-sector" type="text" placeholder="Setor" required></label>
                    <button class="primary-button" type="submit">Adicionar funcionario</button>
                </form>
                <div id="employees-summary" class="employees-summary"></div>
                <div id="employees-list" class="cards-list"></div>
                <div class="list-footer">
                    <button id="employees-toggle" class="ghost-button" type="button">Ver lista completa</button>
                </div>
            </article>
            <article class="panel movements-panel">
                <div class="panel-header">
                    <div><p class="section-kicker">Historico</p><h2>Movimentacoes recentes</h2></div>
                    <button id="movements-toggle" class="ghost-button" type="button">Visualizar historico completo</button>
                </div>
                <div id="movements-list" class="timeline"></div>
            </article>
            <article class="panel spotlight-panel">
                <div class="panel-header"><div><p class="section-kicker">Descarte</p><h2>Monitor de descarte</h2></div></div>
                <div id="discard-total" class="employees-summary"></div>
                <div id="discard-list" class="stack-list"></div>
            </article>
        </section>
    </main>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
    <script src="./module-nav.js"></script>
</body>
</html>
