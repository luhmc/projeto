<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Painel de Controles</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="landing-page">
    <div class="background-shape background-shape-a"></div>
    <div class="background-shape background-shape-b"></div>
    <main class="app-shell landing-shell">
        <section class="landing-brand">
            <img src="./logo-zn-cropped.png" alt="ZN Internet Telecom" class="landing-brand-image">
        </section>
        <section class="landing-grid">
            <a class="landing-card" href="./uniformes.html">
                <div class="landing-card-top">
                    <span class="landing-label">Controle</span>
                    <span class="landing-badge">Operacional</span>
                </div>
                <strong>Uniformes</strong>
                <span class="landing-copy">Estoque, equipe, descarte e lancamentos em uma area unica.</span>
                <div class="landing-graphic landing-graphic-bars" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </a>
            <a class="landing-card landing-card-gerador" href="./gerador.html">
                <div class="landing-card-top">
                    <span class="landing-label">Controle</span>
                    <span class="landing-badge">Tecnico</span>
                </div>
                <strong>Gerador</strong>
                <span class="landing-copy">Painel de manutencao, status automatico, auditoria e lancamentos.</span>
                <div class="landing-graphic landing-graphic-ring" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </a>
        </section>
    </main>
</body>
</html>
